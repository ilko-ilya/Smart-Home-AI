spring:
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5432/smarthome
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

weather:
  url: "https://api.open-meteo.com/v1/forecast?latitude=50.51&longitude=30.79&current_weather=true"

ai:
  groq:
    api-key: ${GROQ_API_KEY}
    url: "https://api.groq.com/openai/v1/chat/completions"